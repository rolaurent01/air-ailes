<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#111111"/>
  <!-- Lens element - concentric circles -->
  <circle cx="180" cy="200" r="60" fill="none" stroke="#F0EDE8" stroke-width="1.2"/>
  <circle cx="180" cy="200" r="45" fill="none" stroke="#F0EDE8" stroke-width="0.8"/>
  <circle cx="180" cy="200" r="28" fill="none" stroke="#7A7A72" stroke-width="0.8"/>
  <circle cx="180" cy="200" r="12" fill="none" stroke="#7A7A72" stroke-width="0.6"/>
  <!-- Light rays converging then diverging -->
  <!-- Top rays -->
  <line x1="240" y1="140" x2="360" y2="195" stroke="#F0EDE8" stroke-width="0.8" stroke-opacity="0.6"/>
  <line x1="360" y1="195" x2="520" y2="120" stroke="#F0EDE8" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="4,4"/>
  <line x1="240" y1="160" x2="360" y2="198" stroke="#F0EDE8" stroke-width="0.8" stroke-opacity="0.7"/>
  <line x1="360" y1="198" x2="520" y2="155" stroke="#F0EDE8" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="4,4"/>
  <!-- Center ray -->
  <line x1="240" y1="200" x2="520" y2="200" stroke="#F0EDE8" stroke-width="1" stroke-opacity="0.8"/>
  <!-- Bottom rays -->
  <line x1="240" y1="240" x2="360" y2="202" stroke="#F0EDE8" stroke-width="0.8" stroke-opacity="0.7"/>
  <line x1="360" y1="202" x2="520" y2="245" stroke="#F0EDE8" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="4,4"/>
  <line x1="240" y1="260" x2="360" y2="205" stroke="#F0EDE8" stroke-width="0.8" stroke-opacity="0.6"/>
  <line x1="360" y1="205" x2="520" y2="280" stroke="#F0EDE8" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="4,4"/>
  <!-- Focus point -->
  <circle cx="360" cy="200" r="5" fill="none" stroke="#F0EDE8" stroke-width="1.2"/>
  <circle cx="360" cy="200" r="1.5" fill="#F0EDE8" stroke="none"/>
  <!-- Focus zone bracket -->
  <line x1="330" y1="155" x2="330" y2="160" stroke="#7A7A72" stroke-width="0.8"/>
  <line x1="330" y1="155" x2="390" y2="155" stroke="#7A7A72" stroke-width="0.8"/>
  <line x1="390" y1="155" x2="390" y2="160" stroke="#7A7A72" stroke-width="0.8"/>
  <line x1="330" y1="245" x2="330" y2="240" stroke="#7A7A72" stroke-width="0.8"/>
  <line x1="330" y1="245" x2="390" y2="245" stroke="#7A7A72" stroke-width="0.8"/>
  <line x1="390" y1="245" x2="390" y2="240" stroke="#7A7A72" stroke-width="0.8"/>
</svg>