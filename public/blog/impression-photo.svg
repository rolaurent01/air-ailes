<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#111111"/>
  <!-- Outer frame -->
  <rect x="140" y="50" width="320" height="300" fill="none" stroke="#F0EDE8" stroke-width="1.2" rx="1"/>
  <!-- Mat border (inner rectangle) -->
  <rect x="175" y="85" width="250" height="230" fill="none" stroke="#7A7A72" stroke-width="0.6"/>
  <!-- Photo area -->
  <rect x="195" y="105" width="210" height="190" fill="none" stroke="#F0EDE8" stroke-width="0.8"/>
  <!-- Minimal landscape inside the photo -->
  <line x1="195" y1="230" x2="405" y2="230" stroke="#7A7A72" stroke-width="0.5"/>
  <path d="M230,230 L270,180 L310,210 L340,170 L380,230" fill="none" stroke="#7A7A72" stroke-width="0.8"/>
  <circle cx="360" cy="145" r="12" fill="none" stroke="#7A7A72" stroke-width="0.6"/>
  <!-- Shadow effect -->
  <line x1="465" y1="55" x2="465" y2="355" stroke="#7A7A72" stroke-width="0.4" stroke-opacity="0.3"/>
  <line x1="145" y1="355" x2="465" y2="355" stroke="#7A7A72" stroke-width="0.4" stroke-opacity="0.3"/>
  <!-- Corner accents -->
  <line x1="140" y1="60" x2="148" y2="60" stroke="#F0EDE8" stroke-width="0.5" stroke-opacity="0.4"/>
  <line x1="140" y1="50" x2="140" y2="58" stroke="#F0EDE8" stroke-width="0.5" stroke-opacity="0.4"/>
  <line x1="452" y1="50" x2="460" y2="50" stroke="#F0EDE8" stroke-width="0.5" stroke-opacity="0.4"/>
  <line x1="460" y1="50" x2="460" y2="58" stroke="#F0EDE8" stroke-width="0.5" stroke-opacity="0.4"/>
</svg>