<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#111111"/>
  <!-- Photo/image icon -->
  <rect x="180" y="100" width="240" height="200" rx="4" fill="none" stroke="#F0EDE8" stroke-width="1.2"/>
  <!-- Mountain inside photo -->
  <path d="M200,270 L260,190 L300,230 L340,175 L400,270" fill="none" stroke="#7A7A72" stroke-width="0.8"/>
  <!-- Sun in photo -->
  <circle cx="360" cy="145" r="15" fill="none" stroke="#7A7A72" stroke-width="0.8"/>
  <!-- Magnifying glass overlapping -->
  <circle cx="380" cy="260" r="50" fill="none" stroke="#F0EDE8" stroke-width="1.5"/>
  <!-- Glass fill for overlay effect -->
  <circle cx="380" cy="260" r="49" fill="#111111" fill-opacity="0.6" stroke="none"/>
  <!-- Handle -->
  <line x1="415" y1="295" x2="460" y2="340" stroke="#F0EDE8" stroke-width="2" stroke-linecap="round"/>
  <!-- Lens shine -->
  <path d="M355,235 Q360,230 370,232" fill="none" stroke="#7A7A72" stroke-width="0.6" stroke-opacity="0.5"/>
  <!-- Search detail lines inside magnifier -->
  <line x1="355" y1="255" x2="405" y2="255" stroke="#7A7A72" stroke-width="0.5"/>
  <line x1="360" y1="265" x2="400" y2="265" stroke="#7A7A72" stroke-width="0.5"/>
  <line x1="365" y1="275" x2="395" y2="275" stroke="#7A7A72" stroke-width="0.5"/>
</svg>