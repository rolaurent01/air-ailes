<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#111111"/>
  <!-- Back frame (rotated slightly) -->
  <rect x="185" y="75" width="200" height="260" rx="2" fill="none" stroke="#7A7A72" stroke-width="0.8" stroke-opacity="0.4" transform="rotate(-8, 285, 205)"/>
  <!-- Middle frame (slightly rotated other way) -->
  <rect x="195" y="70" width="200" height="260" rx="2" fill="none" stroke="#7A7A72" stroke-width="1" stroke-opacity="0.6" transform="rotate(4, 295, 200)"/>
  <!-- Front frame (straight) -->
  <rect x="200" y="70" width="200" height="260" rx="2" fill="none" stroke="#F0EDE8" stroke-width="1.2"/>
  <!-- Content hint in front frame -->
  <line x1="220" y1="240" x2="380" y2="240" stroke="#7A7A72" stroke-width="0.4"/>
  <path d="M240,240 L270,190 L300,220 L330,175 L370,240" fill="none" stroke="#7A7A72" stroke-width="0.6"/>
  <circle cx="350" cy="115" r="12" fill="none" stroke="#7A7A72" stroke-width="0.5"/>
  <!-- Additional loose frames on right side -->
  <rect x="360" y="140" width="120" height="160" rx="2" fill="none" stroke="#F0EDE8" stroke-width="0.8" stroke-opacity="0.5" transform="rotate(6, 420, 220)"/>
  <rect x="370" y="150" width="100" height="130" rx="1" fill="none" stroke="#7A7A72" stroke-width="0.5" stroke-opacity="0.3" transform="rotate(-3, 420, 215)"/>
  <!-- Small scattered frame -->
  <rect x="100" y="170" width="80" height="100" rx="1" fill="none" stroke="#7A7A72" stroke-width="0.6" stroke-opacity="0.35" transform="rotate(-12, 140, 220)"/>
  <!-- Decorative dots -->
  <circle cx="300" cy="350" r="2" fill="#7A7A72" fill-opacity="0.3" stroke="none"/>
  <circle cx="315" cy="350" r="2" fill="#F0EDE8" fill-opacity="0.5" stroke="none"/>
  <circle cx="330" cy="350" r="2" fill="#7A7A72" fill-opacity="0.3" stroke="none"/>
</svg>