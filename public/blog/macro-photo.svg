<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#111111"/>
  <!-- Magnifying glass outer circle -->
  <circle cx="280" cy="180" r="100" fill="none" stroke="#F0EDE8" stroke-width="1.5"/>
  <!-- Inner glass ring -->
  <circle cx="280" cy="180" r="92" fill="none" stroke="#7A7A72" stroke-width="0.4"/>
  <!-- Handle -->
  <line x1="350" y1="250" x2="430" y2="330" stroke="#F0EDE8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="348" y1="252" x2="428" y2="332" stroke="#7A7A72" stroke-width="0.6" stroke-linecap="round"/>
  <!-- Leaf detail inside the magnifier -->
  <!-- Main leaf stem -->
  <path d="M240,230 Q280,180 320,130" fill="none" stroke="#F0EDE8" stroke-width="1"/>
  <!-- Leaf outline -->
  <path d="M260,215 Q240,180 260,145 Q280,120 310,135 Q330,150 320,180 Q310,210 280,220 Q265,222 260,215" fill="none" stroke="#F0EDE8" stroke-width="1"/>
  <!-- Leaf veins -->
  <path d="M275,195 Q280,185 290,178" fill="none" stroke="#7A7A72" stroke-width="0.6"/>
  <path d="M268,185 Q275,175 285,168" fill="none" stroke="#7A7A72" stroke-width="0.6"/>
  <path d="M265,172 Q272,163 282,158" fill="none" stroke="#7A7A72" stroke-width="0.6"/>
  <path d="M268,158 Q273,152 280,148" fill="none" stroke="#7A7A72" stroke-width="0.6"/>
  <!-- Lens shine -->
  <path d="M210,130 Q225,115 245,112" fill="none" stroke="#F0EDE8" stroke-width="0.6" stroke-opacity="0.3"/>
</svg>