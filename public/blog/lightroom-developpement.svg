  <line x1="110" y1="305" x2="135" y2="305" stroke="#7A7A72" stroke-width="0.5"/>
  <!-- Center mark on each slider -->
  <line x1="300" y1="104" x2="300" y2="116" stroke="#7A7A72" stroke-width="0.4"/>
  <line x1="300" y1="169" x2="300" y2="181" stroke="#7A7A72" stroke-width="0.4"/>
  <line x1="300" y1="234" x2="300" y2="246" stroke="#7A7A72" stroke-width="0.4"/>
  <line x1="300" y1="299" x2="300" y2="311" stroke="#7A7A72" stroke-width="0.4"/>
</svg>