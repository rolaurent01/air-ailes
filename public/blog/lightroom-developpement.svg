  <line x1="110" y1="175" x2="135" y2="175" stroke="#7A7A72" stroke-width="0.5"/>
  <!-- Slider 3 -->
  <line x1="150" y1="240" x2="450" y2="240" stroke="#7A7A72" stroke-width="0.8"/>
  <line x1="150" y1="240" x2="380" y2="240" stroke="#F0EDE8" stroke-width="1.2"/>
  <circle cx="380" cy="240" r="7" fill="none" stroke="#F0EDE8" stroke-width="1.2"/>
  <circle cx="380" cy="240" r="2.5" fill="#F0EDE8" stroke="none"/>
  <line x1="110" y1="235" x2="135" y2="235" stroke="#7A7A72" stroke-width="0.5"/>
  <line x1="110" y1="240" x2="135" y2="240" stroke="#7A7A72" stroke-width="0.5"/>
  <!-- Slider 4 -->
  <line x1="150" y1="305" x2="450" y2="305" stroke="#7A7A72" stroke-width="0.8"/>
  <line x1="150" y1="305" x2="300" y2="305" stroke="#F0EDE8" stroke-width="1.2"/>
  <circle cx="300" cy="305" r="7" fill="none" stroke="#F0EDE8" stroke-width="1.2"/>
  <circle cx="300" cy="305" r="2.5" fill="#F0EDE8" stroke="none"/>
