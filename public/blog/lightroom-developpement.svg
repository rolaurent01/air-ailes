<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#111111"/>
  <!-- Slider 1 -->
  <line x1="150" y1="110" x2="450" y2="110" stroke="#7A7A72" stroke-width="0.8"/>
  <line x1="150" y1="110" x2="320" y2="110" stroke="#F0EDE8" stroke-width="1.2"/>
  <circle cx="320" cy="110" r="7" fill="none" stroke="#F0EDE8" stroke-width="1.2"/>
  <circle cx="320" cy="110" r="2.5" fill="#F0EDE8" stroke="none"/>
  <!-- Slider label line -->
  <line x1="110" y1="105" x2="135" y2="105" stroke="#7A7A72" stroke-width="0.5"/>
  <line x1="110" y1="110" x2="135" y2="110" stroke="#7A7A72" stroke-width="0.5"/>
  <!-- Slider 2 -->
  <line x1="150" y1="175" x2="450" y2="175" stroke="#7A7A72" stroke-width="0.8"/>
  <line x1="150" y1="175" x2="260" y2="175" stroke="#F0EDE8" stroke-width="1.2"/>
  <circle cx="260" cy="175" r="7" fill="none" stroke="#F0EDE8" stroke-width="1.2"/>
  <circle cx="260" cy="175" r="2.5" fill="#F0EDE8" stroke="none"/>
