<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#111111"/>
  <!-- Crescent moon -->
  <circle cx="300" cy="160" r="50" fill="none" stroke="#F0EDE8" stroke-width="1.2"/>
  <circle cx="320" cy="150" r="42" fill="#111111" stroke="none"/>
  <!-- Subtle moon glow -->
  <circle cx="300" cy="160" r="65" fill="none" stroke="#F0EDE8" stroke-width="0.3" stroke-opacity="0.2"/>
  <circle cx="300" cy="160" r="80" fill="none" stroke="#F0EDE8" stroke-width="0.2" stroke-opacity="0.1"/>
  <!-- Stars -->
  <circle cx="180" cy="100" r="1.5" fill="#F0EDE8" stroke="none" fill-opacity="0.8"/>
  <circle cx="420" cy="80" r="1" fill="#F0EDE8" stroke="none" fill-opacity="0.6"/>
  <circle cx="450" cy="140" r="1.5" fill="#F0EDE8" stroke="none" fill-opacity="0.7"/>
  <circle cx="160" cy="180" r="1" fill="#F0EDE8" stroke="none" fill-opacity="0.5"/>
  <circle cx="380" cy="60" r="1.2" fill="#F0EDE8" stroke="none" fill-opacity="0.6"/>
  <circle cx="220" cy="60" r="0.8" fill="#F0EDE8" stroke="none" fill-opacity="0.4"/>
  <circle cx="480" cy="180" r="0.8" fill="#F0EDE8" stroke="none" fill-opacity="0.3"/>
  <circle cx="140" cy="130" r="1" fill="#F0EDE8" stroke="none" fill-opacity="0.4"/>
  <circle cx="500" cy="100" r="1.2" fill="#F0EDE8" stroke="none" fill-opacity="0.5"/>
  <!-- Star sparkle on one star -->
  <line x1="180" y1="94" x2="180" y2="106" stroke="#F0EDE8" stroke-width="0.5" stroke-opacity="0.4"/>
  <line x1="174" y1="100" x2="186" y2="100" stroke="#F0EDE8" stroke-width="0.5" stroke-opacity="0.4"/>
  <!-- Horizon/landscape line -->
  <path d="M60,310 Q150,290 200,305 Q280,320 350,295 Q420,280 500,300 L540,305" fill="none" stroke="#7A7A72" stroke-width="0.8" stroke-opacity="0.5"/>
  <!-- Distant treeline silhouette -->
  <path d="M80,310 L100,285 L115,310 L130,280 L148,310 L165,290 L180,310" fill="none" stroke="#7A7A72" stroke-width="0.6" stroke-opacity="0.4"/>
  <path d="M400,300 L420,275 L435,300 L450,270 L468,300 L485,282 L500,300" fill="none" stroke="#7A7A72" stroke-width="0.6" stroke-opacity="0.4"/>
</svg>