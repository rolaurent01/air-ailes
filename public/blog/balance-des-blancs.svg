<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#111111"/>
  <defs>
    <linearGradient id="wbGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6B8FBF"/>
      <stop offset="50%" stop-color="#F0EDE8"/>
      <stop offset="100%" stop-color="#BF8B5E"/>
    </linearGradient>
  </defs>
  <!-- Main gradient bar -->
  <rect x="100" y="175" width="400" height="50" rx="25" fill="none" stroke="url(#wbGrad)" stroke-width="1.5"/>
  <!-- Inner gradient fill, subtle -->
  <rect x="101" y="176" width="398" height="48" rx="24" fill="url(#wbGrad)" fill-opacity="0.12" stroke="none"/>
  <!-- Tick marks along the bar -->
  <line x1="150" y1="230" x2="150" y2="240" stroke="#7A7A72" stroke-width="0.8"/>
  <line x1="225" y1="230" x2="225" y2="240" stroke="#7A7A72" stroke-width="0.8"/>
  <line x1="300" y1="230" x2="300" y2="245" stroke="#F0EDE8" stroke-width="1"/>
  <line x1="375" y1="230" x2="375" y2="240" stroke="#7A7A72" stroke-width="0.8"/>
  <line x1="450" y1="230" x2="450" y2="240" stroke="#7A7A72" stroke-width="0.8"/>
  <!-- Marker/selector triangle -->
  <polygon points="300,165 292,148 308,148" fill="none" stroke="#F0EDE8" stroke-width="1.2" stroke-linejoin="round"/>
  <circle cx="300" cy="155" r="2" fill="#F0EDE8" stroke="none"/>
  <!-- Cool indicator on left -->
  <circle cx="100" cy="200" r="12" fill="none" stroke="#6B8FBF" stroke-width="1" stroke-opacity="0.6"/>
  <circle cx="100" cy="200" r="4" fill="none" stroke="#6B8FBF" stroke-width="0.8" stroke-opacity="0.4"/>
  <!-- Warm indicator on right -->
  <circle cx="500" cy="200" r="12" fill="none" stroke="#BF8B5E" stroke-width="1" stroke-opacity="0.6"/>
  <circle cx="500" cy="200" r="4" fill="none" stroke="#BF8B5E" stroke-width="0.8" stroke-opacity="0.4"/>
  <!-- Temperature scale lines above -->
  <line x1="100" y1="130" x2="500" y2="130" stroke="#7A7A72" stroke-width="0.3" stroke-dasharray="2,6"/>
  <line x1="100" y1="270" x2="500" y2="270" stroke="#7A7A72" stroke-width="0.3" stroke-dasharray="2,6"/>
</svg>