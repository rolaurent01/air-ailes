<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#111111"/>
  <!-- Lightning bolt -->
  <path d="M320,60 L270,190 L310,190 L260,340 L350,180 L305,180 L350,60 Z" fill="none" stroke="#F0EDE8" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Radiating light lines -->
  <line x1="210" y1="120" x2="170" y2="90" stroke="#F0EDE8" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="190" y1="180" x2="140" y2="170" stroke="#F0EDE8" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="200" y1="240" x2="150" y2="260" stroke="#F0EDE8" stroke-width="0.8" stroke-opacity="0.3"/>
  <line x1="390" y1="120" x2="430" y2="90" stroke="#F0EDE8" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="410" y1="180" x2="460" y2="170" stroke="#F0EDE8" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="400" y1="240" x2="450" y2="260" stroke="#F0EDE8" stroke-width="0.8" stroke-opacity="0.3"/>
  <!-- Short burst lines -->
  <line x1="230" y1="90" x2="205" y2="60" stroke="#7A7A72" stroke-width="0.6" stroke-opacity="0.4"/>
  <line x1="370" y1="90" x2="395" y2="60" stroke="#7A7A72" stroke-width="0.6" stroke-opacity="0.4"/>
  <line x1="175" y1="145" x2="140" y2="130" stroke="#7A7A72" stroke-width="0.6" stroke-opacity="0.3"/>
  <line x1="425" y1="145" x2="460" y2="130" stroke="#7A7A72" stroke-width="0.6" stroke-opacity="0.3"/>
  <!-- Glow circles -->
  <circle cx="300" cy="200" r="120" fill="none" stroke="#F0EDE8" stroke-width="0.3" stroke-opacity="0.15"/>
  <circle cx="300" cy="200" r="150" fill="none" stroke="#F0EDE8" stroke-width="0.2" stroke-opacity="0.08"/>
</svg>